<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>樣品檢驗申請 - 填報系統</title>
    <style>
        body {
            font-family: '微軟正黑體', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px 10px;
            color: #333;
        }
        .app-container {
            max-width: 800px;
            margin: 0 auto;
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; font-size: 22px; }
        
        /* 乾淨的卡片式設計 */
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-top: 4px solid #3498db;
        }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #2980b9; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        
        /* 表單排版 */
        .form-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .form-group { flex: 1; min-width: 120px; display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; color: #666; margin-bottom: 4px; font-weight: bold; }
        input[type="text"], input[type="date"], input[type="time"], select {
            padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 2px rgba(52,152,219,0.2); }

        /* 分析項目子清單 */
        .item-list { background: #f9f9f9; border-radius: 6px; padding: 10px; margin-top: 10px; border: 1px dashed #ccc; }
        .item-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .item-row input, .item-row select { padding: 6px; font-size: 13px; }
        
        /* 按鈕設計 */
        .btn { padding: 8px 15px; font-size: 14px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; text-align: center; }
        .btn-add { background-color: #e8f4fd; color: #2980b9; border: 1px solid #b3d7f2; }
        .btn-add:hover { background-color: #d1e8fa; }
        .btn-danger { background-color: #ffeaea; color: #c0392b; padding: 6px 10px; }
        .btn-danger:hover { background-color: #ffd1d1; }
        .btn-primary { background-color: #3498db; color: #fff; width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-primary:hover { background-color: #2980b9; }

    </style>
</head>
<body>

<div class="app-container">
    <h2>樣品檢驗申請 - 資料填報</h2>

    <div class="card" style="border-top-color: #2c3e50;">
        <div class="card-title">1. 基本資料</div>
        <div class="form-row">
            <div class="form-group">
                <label>採樣人員</label>
                <input type="text" id="sampler" value="環保局" placeholder="如: 環保局">
            </div>
            <div class="form-group">
                <label>送樣人員</label>
                <input type="text" id="deliverer" placeholder="請輸入姓名">
            </div>
        </div>
    </div>

    <div id="samplesContainer"></div>

    <button class="btn btn-add" style="width: 100%; margin-bottom: 15px; padding: 10px; border-style: dashed;" onclick="addSample()">
        + 新增下一個採樣地點
    </button>

    <div class="card" style="border-top-color: #f39c12;">
        <div class="card-title">3. 實驗室要求事項</div>
        <div class="form-group">
            <input type="text" id="requirements" value="PH 、 水溫 、導電度數值由環保局提供。" placeholder="請輸入要求事項...">
        </div>
    </div>

    <button class="btn btn-primary" onclick="generateWord()">匯出正式檢驗申請單 (.doc)</button>
</div>

        addSample(); // 預設提供一個採樣地點
    };
