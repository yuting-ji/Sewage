<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>竹南污水處理廠 - 水質採樣紀錄表</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'LiHei Pro', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #0056b3;
            font-size: 22px;
            margin-bottom: 20px;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 15px;
            color: #444;
        }
        input[type="text"], input[type="date"], input[type="time"], input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccd0d5;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px; /* 防止 iOS 縮放 */
            background-color: #fafbfc;
        }
        input:focus, select:focus {
            border-color: #0056b3;
            outline: none;
            background-color: #fff;
        }
        .hidden {
            display: none;
        }
        /* 動態區塊樣式 */
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #0056b3;
            margin-top: 25px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dynamic-row {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .dynamic-row .col {
            flex: 1 1 45%; /* 手機畫面一行排兩個或單獨排 */
            min-width: 120px;
        }
        .dynamic-row .col-full {
            flex: 1 1 100%;
        }
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.2s;
        }
        .btn-add {
            background-color: #28a745;
            color: white;
            padding: 6px 12px;
            font-size: 14px;
        }
        .btn-remove {
            background-color: #dc3545;
            color: white;
            width: 100%;
            margin-top: 5px;
        }
        .btn-submit {
            background-color: #0056b3;
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>竹南污水處理廠採樣紀錄</h2>
    
    <form id="samplingForm">
        <div class="form-group">
            <label>採樣單位:</label>
            <input type="text" name="sampling_unit" placeholder="請輸入採樣單位">
        </div>
        <div class="form-group">
            <label>送樣人員:</label>
            <input type="text" name="deliverer" placeholder="請輸入送樣人員姓名">
        </div>
        <div class="form-group">
            <label>採樣地點:</label>
            <input type="text" name="location" placeholder="例如: T01調節池 (南側1+2池)">
        </div>
        
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>採樣日期:</label>
                <input type="date" name="sample_date">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>採樣時間:</label>
                <input type="time" name="sample_time">
            </div>
        </div>

        <div class="form-group">
            <label>樣品外觀:</label>
            <select id="appearanceSelect" onchange="toggleOtherAppearance()">
                <option value="" disabled selected>請選擇樣品外觀</option>
                <option value="透明">透明</option>
                <option value="微濁">微濁</option>
                <option value="混濁">混濁</option>
                <option value="其他">其他</option>
            </select>
            <input type="text" id="appearanceOther" class="hidden" placeholder="請說明其他外觀" style="margin-top: 10px;">
        </div>

        <div class="section-title">
            <span>分析項目清單</span>
            <button type="button" class="btn btn-add" onclick="addAnalysisRow()">+ 新增項目</button>
        </div>
        <div id="analysisContainer">
            <div class="dynamic-row">
                <div class="col-full">
                    <label>分析項目:</label>
                    <input type="text" placeholder="例如: COD, SS, 氨氮">
                </div>
                <div class="col">
                    <label>體積(ml):</label>
                    <input type="number" placeholder="ml">
                </div>
                <div class="col">
                    <label>數量:</label>
                    <input type="number" placeholder="瓶/個">
                </div>
                <div class="col-full">
                    <label>保存方式:</label>
                    <select>
                        <option value="R">R</option>
                        <option value="R-SA">R-SA</option>
                        <option value="R-NA">R-NA</option>
                        <option value="R-CA">R-CA</option>
                        <option value="R-SH">R-SH</option>
                        <option value="R-AS">R-AS</option>
                        <option value="R-SF">R-SF</option>
                    </select>
                </div>
                </div>
        </div>

        <div class="section-title">
            <span>現場量測記錄</span>
            <button type="button" class="btn btn-add" onclick="addMeasurementRow()">+ 新增量測</button>
        </div>
        <div id="measurementContainer">
            <div class="dynamic-row">
                <div class="col">
                    <label>pH:</label>
                    <input type="number" step="0.01" placeholder="數值">
                </div>
                <div class="col">
                    <label>水溫 (℃):</label>
                    <input type="number" step="0.1" placeholder="數值">
                </div>
                <div class="col-full">
                    <label>導電度 (µmho/cm):</label>
                    <input type="number" step="1" placeholder="數值">
                </div>
            </div>
        </div>

        <button type="button" class="btn btn-submit" onclick="submitForm()">確認送出紀錄</button>
    </form>
</div>

<script>
    // 控制「樣品外觀」選擇其他時顯示輸入框
    function toggleOtherAppearance() {
        const select = document.getElementById("appearanceSelect");
        const otherInput = document.getElementById("appearanceOther");
        if (select.value === "其他") {
            otherInput.classList.remove("hidden");
            otherInput.focus();
        } else {
            otherInput.classList.add("hidden");
            otherInput.value = ""; // 清空值
        }
    }

    // 新增分析項目列
    function addAnalysisRow() {
        const container = document.getElementById("analysisContainer");
        const row = document.createElement("div");
        row.className = "dynamic-row";
        row.innerHTML = `
            <div class="col-full">
                <label>分析項目:</label>
                <input type="text" placeholder="例如: COD, SS, 氨氮">
            </div>
            <div class="col">
                <label>體積(ml):</label>
                <input type="number" placeholder="ml">
            </div>
            <div class="col">
                <label>數量:</label>
                <input type="number" placeholder="瓶/個">
            </div>
            <div class="col-full">
                <label>保存方式:</label>
                <select>
                    <option value="R">R</option>
                    <option value="R-SA">R-SA</option>
                    <option value="R-NA">R-NA</option>
                    <option value="R-CA">R-CA</option>
                    <option value="R-SH">R-SH</option>
                    <option value="R-AS">R-AS</option>
                    <option value="R-SF">R-SF</option>
                </select>
            </div>
            <button type="button" class="btn btn-remove" onclick="this.parentElement.remove()">- 刪除此項目</button>
        `;
        container.appendChild(row);
    }

    // 新增其他現場量測列
    function addMeasurementRow() {
        const container = document.getElementById("measurementContainer");
        const row = document.createElement("div");
        row.className = "dynamic-row";
        row.innerHTML = `
            <div class="col">
                <label>量測項目名稱 (其他):</label>
                <input type="text" placeholder="例如: 溶氧(DO)">
            </div>
            <div class="col">
                <label>數值:</label>
                <input type="text" placeholder="數值與單位">
            </div>
            <button type="button" class="btn btn-remove" onclick="this.parentElement.remove()">- 刪除此量測</button>
        `;
        container.appendChild(row);
    }

    // 模擬送出表單
    function submitForm() {
        alert("採樣紀錄已成功記錄！\n(此為前端展示，實際應用需串接後端資料庫)");
    }

    // 初始化日期與時間為當下時間
    window.onload = function() {
        const now = new Date();
        const dateString = now.toISOString().split('T')[0];
        const timeString = now.toTimeString().split(' ')[0].substring(0,5);
        document.querySelector('input[name="sample_date"]').value = dateString;
        document.querySelector('input[name="sample_time"]').value = timeString;
    };
</script>

</body>
</html>
