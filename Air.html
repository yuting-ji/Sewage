<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廢水廠曝氣系統運算器 | Aeration System Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        #calc-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .form-group {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }
        .form-group label {
            flex: 1;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            flex: 2;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .mode-switch {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: background 0.3s;
        }
        .btn-calc { background-color: #27ae60; }
        .btn-calc:hover { background-color: #2ecc71; }
        .btn-clear { background-color: #e74c3c; }
        .btn-clear:hover { background-color: #c0392b; }
        .btn-print { background-color: #2980b9; }
        .btn-print:hover { background-color: #3498db; }
        .btn-word { background-color: #8e44ad; }
        .btn-word:hover { background-color: #9b59b6; }
        
        #process-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 4px solid #f39c12;
            min-height: 100px;
            white-space: pre-line;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        /* 列印時隱藏按鈕 */
        @media print {
            .btn-group, .mode-switch { display: none; }
            body { background-color: #fff; }
            #calc-container { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

<div id="calc-container">
    <h2>曝氣系統工程運算器</h2>
    
    <div class="mode-switch">
        <label for="calcMode"><strong>運算模式選擇：</strong></label>
        <select id="calcMode" onchange="toggleMode()">
            <option value="forward">正向計算 (輸入水質與尺寸 ➔ 求風量與風壓)</option>
            <option value="reverse">反向推算 (輸入風量與風壓 ➔ 推算最大可處理 BOD)</option>
        </select>
    </div>

    <form id="calcForm">
        <div class="form-group">
            <label>日處理水量 Q (CMD):</label>
            <input type="number" id="flowQ" value="20000" step="100">
        </div>
        <div class="form-group">
            <label>水池深度 H (m):</label>
            <input type="number" id="depthH" value="5" step="0.1">
        </div>
        <div class="form-group">
            <label>氧氣轉移效率 OTE (%):</label>
            <input type="number" id="ote" value="20" step="1">
        </div>

        <div id="forward-inputs">
            <div class="form-group">
                <label>進流 BOD (mg/L):</label>
                <input type="number" id="bodIn" value="100">
            </div>
            <div class="form-group">
                <label>出流 BOD (mg/L):</label>
                <input type="number" id="bodOut" value="5">
            </div>
            <div class="form-group">
                <label>風量安全係數:</label>
                <input type="number" id="safetyFactor" value="1.5" step="0.1">
            </div>
        </div>

        <div id="reverse-inputs" style="display: none;">
            <div class="form-group">
                <label>鼓風機運轉風量 (Nm³/hr):</label>
                <input type="number" id="blowerAir" value="2300">
            </div>
            <div class="form-group">
                <label>要求出水 BOD (mg/L):</label>
                <input type="number" id="targetBodOut" value="5">
            </div>
        </div>
    </form>

    <div class="btn-group">
        <button class="btn-calc" onclick="calculate()">執行運算 (Calculate)</button>
        <button class="btn-clear" onclick="clearAll()">一鍵清除 (Clear)</button>
        <button class="btn-print" onclick="window.print()">預覽/列印 PDF (Print)</button>
        <button class="btn-word" onclick="exportWord()">匯出 Word 檔 (Export to Doc)</button>
    </div>

    <h3>運算過程與結果顯示：</h3>
    <div id="process-box">請輸入參數並點擊「執行運算」以顯示結果。</div>
</div>

<script>
    function toggleMode() {
        const mode = document.getElementById('calcMode').value;
        if (mode === 'forward') {
            document.getElementById('forward-inputs').style.display = 'block';
            document.getElementById('reverse-inputs').style.display = 'none';
        } else {
            document.getElementById('forward-inputs').style.display = 'none';
            document.getElementById('reverse-inputs').style.display = 'block';
        }
    }

    function calculate() {
        const mode = document.getElementById('calcMode').value;
        const Q = parseFloat(document.getElementById('flowQ').value);
        const H = parseFloat(document.getElementById('depthH').value);
        const OTE = parseFloat(document.getElementById('ote').value) / 100;
        let processText = "";

        if (isNaN(Q) || isNaN(H) || isNaN(OTE)) {
            document.getElementById('process-box').innerHTML = "<span style='color:red;'>錯誤：請確認所有共同參數皆已輸入數值。</span>";
            return;
        }

        if (mode === 'forward') {
            const bodIn = parseFloat(document.getElementById('bodIn').value);
            const bodOut = parseFloat(document.getElementById('bodOut').value);
            const SF = parseFloat(document.getElementById('safetyFactor').value);
            
            const deltaBOD = bodIn - bodOut;
            // AOR = Q * deltaBOD * 1.1 (代謝耗氧係數) / 1000 (換算為公斤)
            const AOR = (Q * deltaBOD * 1.1) / 1000;
            const SOR = AOR / OTE;
            const airWeight = SOR / 0.232; // 空氣含氧重量比
            const airVolDaily = airWeight / 1.5; // 每日標準空氣體積 (m3/d)
            const airVolHr = airVolDaily / 24; 
            const finalAirVol = airVolHr * SF;

            // 風壓估算 (水壓 + 散氣管損與管損估計 10kPa)
            const pressure = (H * 10) + 10; 

            processText = `【正向計算結果】
                1. 參數確認：水量 = ${Q} CMD, BOD 差值 = ${deltaBOD} mg/L
                2. 實際需氧量 (AOR) = (${Q} × ${deltaBOD} × 1.1) / 1000 = ${AOR.toFixed(2)} kg-O2/d
                3. 標準需氧量 (SOR) = ${AOR.toFixed(2)} / ${OTE} (OTE) = ${SOR.toFixed(2)} kg-O2/d
                4. 所需空氣重量 = ${SOR.toFixed(2)} / 0.232 = ${airWeight.toFixed(2)} kg-Air/d
                5. 理論小時風量 = ${airWeight.toFixed(2)} / (1.5 × 24) = ${airVolHr.toFixed(2)} Nm³/hr
                6. 加入安全係數 (${SF}) 後設計風量 = ${airVolHr.toFixed(2)} × ${SF} = ${(finalAirVol).toFixed(2)} Nm³/hr
                
                ■ 推薦鼓風機規格：
                - 需求風量 (Gs): **${Math.ceil(finalAirVol)} Nm³/hr**
                - 需求風壓 (P): **${pressure.toFixed(1)} kPa** (約 ${(pressure/100).toFixed(2)} kg/cm²)
                (備註：風壓已包含 ${H}m 靜水壓及 10kPa 管路/散氣盤壓降估算)`;

        } else {
            const blowerAir = parseFloat(document.getElementById('blowerAir').value);
            const targetBodOut = parseFloat(document.getElementById('targetBodOut').value);
            
            // 反推邏輯
            const airVolDaily = blowerAir * 24; // 每日總風量 Nm3
            const airWeight = airVolDaily * 1.5; // 每日空氣重 kg
            const SOR = airWeight * 0.232; // 供氧能力
            const AOR = SOR * OTE; // 實際溶入水中氧量
            
            // 系統能處理的最高 BOD 總量 (kg)
            const totalBODLoad = AOR / 1.1; 
            // 換算回濃度差
            const maxDeltaBOD = (totalBODLoad * 1000) / Q;
            const maxBodIn = maxDeltaBOD + targetBodOut;

            processText = `【反向推算結果】
                1. 參數確認：供風量 = ${blowerAir} Nm³/hr, 水量 = ${Q} CMD
                2. 每日供氣總重量 = ${blowerAir} × 24 × 1.5 = ${airWeight.toFixed(2)} kg-Air/d
                3. 系統標準供氧能力 (SOR) = ${airWeight.toFixed(2)} × 0.232 = ${SOR.toFixed(2)} kg-O2/d
                4. 實際可利用氧量 (AOR) = ${SOR.toFixed(2)} × ${OTE} (OTE) = ${AOR.toFixed(2)} kg-O2/d
                5. 系統最大可代謝 BOD 總量 = ${AOR.toFixed(2)} / 1.1 = ${totalBODLoad.toFixed(2)} kg-BOD/d
                6. 換算最大容許 BOD 濃度差 = (${totalBODLoad.toFixed(2)} × 1000) / ${Q} = ${maxDeltaBOD.toFixed(2)} mg/L
                
                ■ 系統極限能力評估：
                - 該風量條件下，最大可處理進流 BOD 濃度為：**${maxBodIn.toFixed(2)} mg/L**
                (當要求出水 BOD 為 ${targetBodOut} mg/L 時)`;
        }

        document.getElementById('process-box').innerHTML = processText;
    }

    function clearAll() {
        document.getElementById('calcForm').reset();
        document.getElementById('process-box').innerHTML = "請輸入參數並點擊「執行運算」以顯示結果。";
    }

    function exportWord() {
        const processContent = document.getElementById('process-box').innerText;
        const modeText = document.getElementById('calcMode').options[document.getElementById('calcMode').selectedIndex].text;
        
        // 建立簡易 HTML 結構供 Word 讀取
        const preHtml = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>運算報告</title></head><body>";
        const content = `<h2>曝氣系統工程運算報告</h2><p><strong>運算模式：</strong>${modeText}</p><hr><h3>運算過程與結果：</h3><pre style="font-family: '微軟正黑體', sans-serif; font-size: 11pt;">${processContent}</pre>`;
        const postHtml = "</body></html>";
        const html = preHtml + content + postHtml;

        // 使用 Blob 轉換為 doc 格式並觸發下載
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const url = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(html);
        const filename = '曝氣系統運算報告.doc';
        
        const downloadLink = document.createElement("a");
        document.body.appendChild(downloadLink);
        
        if (navigator.msSaveOrOpenBlob) {
            navigator.msSaveOrOpenBlob(blob, filename);
        } else {
            downloadLink.href = url;
            downloadLink.download = filename;
            downloadLink.click();
        }
        document.body.removeChild(downloadLink);
    }
</script>
</body>
</html>
